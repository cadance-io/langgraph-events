site_name: langgraph-events
site_description: Event-driven abstraction for LangGraph
site_url: https://cadance-io.github.io/langgraph-events/
repo_url: https://github.com/cadance-io/langgraph-events
repo_name: cadance-io/langgraph-events

theme:
  name: material

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Control Flow: control-flow.md
  - Reducers: reducers.md
  - Streaming: streaming.md
  - Patterns: patterns.md
  - API Reference: api.md
  - Migrating from 0.3.0: migrating.md
  - AG-UI Adapter: agui.md
  - Checkpointer & Graph Evolution: checkpointer-evolution.md

markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
