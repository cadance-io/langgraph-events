site_url: https://cadance-io.github.io/langgraph-events/
repo_url: https://github.com/cadance-io/langgraph-events
repo_name: cadance-io/langgraph-events

theme:
  name: material

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
