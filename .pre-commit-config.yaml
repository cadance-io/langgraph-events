default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy src/
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: mermaid-graphs
        name: mermaid-graphs
        language: system
        entry: uv run python scripts/generate_mermaid.py
        pass_filenames: false
        require_serial: true
        files: ^examples/.*\.py$

      - id: pytest
        name: pytest
        language: system
        entry: uv run pytest
        types: [python]
        pass_filenames: false
        require_serial: true
        files: ^(src/|tests/)
